<html lang="ko">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --accent3: #43e8c8;
    --text: #f0f0f8;
    --text-muted: #8888aa;
    --lotte: #e8445a;
    --hyundai: #1e88e5;
    --shinsegae: #43a047;
    --ak: #fb8c00;
    --starfield: #8e24aa;
    --ipark: #00acc1;
    --outlet: #f57c00;
    --galleria: #c62828;
    --other: #546e7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  /* Month tabs */
  .month-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .month-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--text); }
  .month-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .month-btn.all { }
  .month-btn[data-month="1"].active  { background: #e53935; border-color: #e53935; }
  .month-btn[data-month="2"].active  { background: #e91e8c; border-color: #e91e8c; }
  .month-btn[data-month="3"].active  { background: #43a047; border-color: #43a047; }
  .month-btn[data-month="4"].active  { background: #fb8c00; border-color: #fb8c00; }
  .month-btn[data-month="5"].active  { background: #00acc1; border-color: #00acc1; }
  .month-btn[data-month="6"].active  { background: #8e24aa; border-color: #8e24aa; }
  .month-btn[data-month="7"].active  { background: #546e7a; border-color: #546e7a; }

  /* Stats bar */
  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .stat-item strong {
    color: var(--accent3);
    font-size: 14px;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Brand filter chips */
  .brand-filters {
    padding: 10px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .brand-chip {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    opacity: 0.5;
  }
  .brand-chip.active { opacity: 1; }
  .brand-chip:hover { opacity: 0.8; }
  .chip-lotte    { background: rgba(232,68,90,0.15);   color: var(--lotte);    border-color: rgba(232,68,90,0.4); }
  .chip-hyundai  { background: rgba(30,136,229,0.15);  color: var(--hyundai);  border-color: rgba(30,136,229,0.4); }
  .chip-shinsegae{ background: rgba(67,160,71,0.15);   color: var(--shinsegae);border-color: rgba(67,160,71,0.4); }
  .chip-ak       { background: rgba(251,140,0,0.15);   color: var(--ak);       border-color: rgba(251,140,0,0.4); }
  .chip-starfield{ background: rgba(142,36,170,0.15);  color: var(--starfield);border-color: rgba(142,36,170,0.4); }
  .chip-ipark    { background: rgba(0,172,193,0.15);   color: var(--ipark);    border-color: rgba(0,172,193,0.4); }
  .chip-outlet   { background: rgba(245,124,0,0.15);   color: var(--outlet);   border-color: rgba(245,124,0,0.4); }
  .chip-galleria { background: rgba(198,40,40,0.15);   color: var(--galleria); border-color: rgba(198,40,40,0.4); }
  .chip-other    { background: rgba(84,110,122,0.15);  color: var(--other);    border-color: rgba(84,110,122,0.4); }

  /* Store list */
  .store-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-track { background: transparent; }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .store-card {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .store-card:hover { background: var(--surface2); }
  .store-card.selected { background: var(--surface2); border-color: var(--border); }

  .store-card-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .store-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .store-schedule {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    padding-left: 16px;
  }
  .store-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    padding-left: 16px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .meta-days { background: rgba(108,99,255,0.15); color: #9d97ff; }
  .meta-sales { background: rgba(67,232,200,0.15); color: var(--accent3); }
  .meta-manager { background: rgba(255,107,157,0.15); color: #ff8fb5; }

  /* ── Map ── */
  #map {
    flex: 1;
    background: #1a1a22;
  }

  /* Leaflet dark overrides */
  .leaflet-tile-pane { filter: brightness(0.7) saturate(0.5) hue-rotate(200deg); }
  .leaflet-control-zoom a {
    background: var(--surface2) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--border) !important; }
  .leaflet-control-attribution {
    background: rgba(15,15,19,0.7) !important;
    color: var(--text-muted) !important;
    font-size: 9px !important;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--surface2); }
  .leaflet-popup-content { margin: 14px 16px; min-width: 200px; }

  .popup-header {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .popup-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    gap: 12px;
  }
  .popup-label { color: var(--text-muted); }
  .popup-val { color: var(--text); font-weight: 500; text-align: right; }
  .popup-sales-val { color: var(--accent3); font-weight: 600; }
  .popup-month-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 6px;

  .m2  { background: rgba(233,30,140,0.2);  color: #ec407a; }
  .m3  { background: rgba(67,160,71,0.2);   color: #66bb6a; }

  .m7  { background: rgba(84,110,122,0.2);  color: #78909c; }

  .no-results {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 13px;
  }
  .no-results span { font-size: 32px; display: block; margin-bottom: 8px; }
</style>

  { month:7, name:'대전 롯데백화점',        schedule:'7/24~7/30',  days:7,  total_sales:0,          daily_avg:0,        manager:'이정아 리더',   brand:'롯데',      lat:36.3514, lng:127.3845 },

// ── Brand config ─────────────────────────────────────────────────────────────
const brandConfig = {
  '롯데':    { color: '#e8445a', chip: 'chip-lotte' },
  '현대':    { color: '#1e88e5', chip: 'chip-hyundai' },
  '신세계':  { color: '#43a047', chip: 'chip-shinsegae' },
  'AK플라자':{ color: '#fb8c00', chip: 'chip-ak' },
  '스타필드':{ color: '#8e24aa', chip: 'chip-starfield' },
  '아이파크':{ color: '#00acc1', chip: 'chip-ipark' },
  '아울렛':  { color: '#f57c00', chip: 'chip-outlet' },
  '갤러리아':{ color: '#c62828', chip: 'chip-galleria' },
};
function getBrandColor(brand) {
  return (brandConfig[brand] || { color: '#546e7a' }).color;
}

const monthColors = {
  1:'#e53935', 2:'#e91e8c', 3:'#43a047',
  4:'#fb8c00', 5:'#00acc1', 6:'#8e24aa', 7:'#546e7a'
};

// ── State ─────────────────────────────────────────────────────────────────────
let currentMonth = 'all';
let activeBrands = new Set(Object.keys(brandConfig));
let markers = {};
let selectedCard = null;

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [36.5, 127.9], zoom: 7, zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ── Marker creation ──────────────────────────────────────────────────────────
function createMarkerIcon(store) {
  const color = getBrandColor(store.brand);
  const mColor = monthColors[store.month] || '#888';
  const size = store.total_sales > 80000000 ? 16 : store.total_sales > 30000000 ? 14 : 12;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px; height:${size}px;
      background:${color};
      border:2px solid ${mColor};
      border-radius:50%;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      transition:transform 0.15s;
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
  });
}

function formatSales(v) {
  if (!v || v === 0) return '집계중';
  if (v >= 100000000) return (v/100000000).toFixed(1) + '억';
  return (v/10000).toFixed(0) + '만';
}

function createPopup(store) {
  const mColor = monthColors[store.month];
  const bColor = getBrandColor(store.brand);
  return `
    <div class="popup-header" style="color:${bColor}">${store.name}</div>
    <div class="popup-row"><span class="popup-label">일정</span><span class="popup-val">${store.schedule} (${store.days}일)</span></div>
    <div class="popup-row"><span class="popup-label">전체 매출</span><span class="popup-val popup-sales-val">${formatSales(store.total_sales)}</span></div>
    ${store.daily_avg ? `<div class="popup-row"><span class="popup-label">일평균</span><span class="popup-val">${formatSales(store.daily_avg)}</span></div>` : ''}
    ${store.manager ? `<div class="popup-row"><span class="popup-label">담당자</span><span class="popup-val">${store.manager}</span></div>` : ''}
    <div><span class="popup-month-badge m${store.month}">${store.month}월</span></div>
  `;
}

// ── Render ────────────────────────────────────────────────────────────────────
function getFiltered() {
  return stores.filter(s => {
    const monthOk = currentMonth === 'all' || s.month === parseInt(currentMonth);
    const brandOk = activeBrands.has(s.brand) || !brandConfig[s.brand];
    return monthOk && brandOk;
  });
}

function renderAll() {
  const filtered = getFiltered();

  // Clear markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // Render markers
  filtered.forEach((store, i) => {
    const marker = L.marker([store.lat, store.lng], { icon: createMarkerIcon(store) })
      .addTo(map)
      .bindPopup(createPopup(store), { maxWidth: 260 });
    marker.on('click', () => selectStore(i));
    markers[i] = marker;
  });

  // Render sidebar list
  const list = document.getElementById('store-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results"><span>🔍</span>해당 조건의 매장이 없습니다</div>';
  } else {
    list.innerHTML = filtered.map((s, i) => {
      const color = getBrandColor(s.brand);
      const mColor = monthColors[s.month];
      return `
        <div class="store-card" id="card-${i}" onclick="selectStore(${i})">
          <div class="store-card-top">
            <div class="brand-dot" style="background:${color}"></div>
            <div class="store-name">${s.name}</div>
            <span style="font-size:10px;color:${mColor};font-weight:700;flex-shrink:0">${s.month}월</span>
          </div>
          <div class="store-schedule">${s.schedule} · ${s.days}일</div>
          <div class="store-meta">
            ${s.total_sales > 0 ? `<span class="meta-tag meta-sales">💰 ${formatSales(s.total_sales)}</span>` : ''}
            ${s.manager ? `<span class="meta-tag meta-manager">👤 ${s.manager}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // Stats
  const totalSales = filtered.reduce((a, s) => a + (s.total_sales || 0), 0);
  document.getElementById('stat-count').textContent = filtered.length;
  document.getElementById('stat-sales').textContent = totalSales > 0 ? formatSales(totalSales) : '-';
  document.getElementById('list-count').textContent = filtered.length;
}

function selectStore(i) {
  const filtered = getFiltered();
  const store = filtered[i];
  if (!store) return;

  // Highlight card
  if (selectedCard !== null) {
    const prev = document.getElementById(`card-${selectedCard}`);
    if (prev) prev.classList.remove('selected');
  }
  selectedCard = i;
  const card = document.getElementById(`card-${i}`);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Fly to marker and open popup
  if (markers[i]) {
    map.flyTo([store.lat, store.lng], 13, { duration: 0.8 });
    setTimeout(() => markers[i].openPopup(), 500);
  }
}

// ── Brand filter chips ────────────────────────────────────────────────────────
function renderBrandChips() {
  const container = document.getElementById('brand-filters');
  const allBrands = [...Object.keys(brandConfig)];
  container.innerHTML = allBrands.map(brand => {
    const cfg = brandConfig[brand];
    const isActive = activeBrands.has(brand);
    return `<span class="brand-chip ${cfg.chip} ${isActive ? 'active' : ''}" onclick="toggleBrand('${brand}')">${brand}</span>`;
  }).join('');
}

function toggleBrand(brand) {
  if (activeBrands.has(brand)) {
    if (activeBrands.size === 1) return; // keep at least one
    activeBrands.delete(brand);
  } else {
    activeBrands.add(brand);
  }
  renderBrandChips();
  renderAll();
}

// ── Month tab click ───────────────────────────────────────────────────────────
document.querySelectorAll('.month-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMonth = btn.dataset.month;
    selectedCard = null;
    renderAll();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderBrandChips();
renderAll();
</script>
