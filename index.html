    display: flex;
    flex-direction: column;
    overflow: hidden;

    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;

  .m-btn[data-m="5"].active  { background: #00acc1; }
  .m-btn[data-m="6"].active  { background: #8e24aa; }
  .m-btn[data-m="7"].active  { background: #546e7a; }

  .stats strong { color: var(--accent3); font-size: 13px; }
  .last-updated { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    white-space: nowrap;

  .refresh-icon { display: inline-block; transition: transform 0.3s; }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 300px;
    min-width: 260px;
    background: var(--surface);

    flex-direction: column;

function findCoord(name) {
  for (const e of COORD_MAP) {
    for (const k of e.keys) {
      if (name.includes(k) || k.includes(name.replace(/\s/g,''))) return {lat:e.lat,lng:e.lng};
    }
  }
  return {lat:37.5665,lng:126.9780};
}

function detectBrand(name) {
  if (name.includes('롯데아울렛')||name.includes('롯데몰')) return '아울렛';
  if (name.includes('롯데')) return '롯데';
  if (name.includes('현대모비스')||name.includes('현대아울렛')) return '현대';
  if (name.includes('현대')) return '현대';
  if (name.includes('신세계')) return '신세계';
  if (name.includes('AK플라자')||name.includes('AK ')) return 'AK플라자';
  if (name.includes('스타필드')) return '스타필드';
  if (name.includes('아이파크')) return '아이파크';
  if (name.includes('갤러리아')) return '갤러리아';
  if (name.includes('아울렛')) return '아울렛';
  return '기타';
}

function parseCSV(text) {
  return text.trim().split('\n').map(r => {
    const cols = []; let cur='', inQ=false;
    for (let i=0;i<r.length;i++) {
      if (r[i]==='"') { inQ=!inQ; }
      else if (r[i]===','&&!inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=r[i];
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseStores(rows) {
  const stores = []; let currentMonth = null;
  for (const row of rows) {
    const colH=row[7]||'', colI=row[8]||'', colJ=row[9]||'',
          colK=row[10]||'', colL=row[11]||'', colM=row[12]||'',
          colN=row[13]||'', colO=row[14]||'';
    const mNum = parseInt(colI.replace('월','').trim());
    if (!isNaN(mNum)&&mNum>=1&&mNum<=12) currentMonth=mNum;
    const seq = parseInt(colH);
    if (isNaN(seq)||seq<=0) continue;
    const storeName = colJ.replace(/"/g,'').trim();
    if (!storeName||storeName==='-'||storeName==='지점') continue;
    if (!currentMonth) continue;
    const coord = findCoord(storeName);
    stores.push({
      month: currentMonth,
      name: storeName,
      schedule: colK.trim(),
      days: parseInt(colL)||0,
      total_sales: parseFloat(colM.replace(/,/g,''))||0,
      daily_avg:   parseFloat(colN.replace(/,/g,''))||0,
      manager: colO.trim(),
      brand: detectBrand(storeName),
      lat: coord.lat, lng: coord.lng,
    });
  }
  return stores;
}

// ── 상태
let ALL_STORES=[], currentMonth='all', activeBrands=new Set(Object.keys(BRAND_COLORS)), markers={}, selectedIdx=null;

// ── 지도
const map = L.map('map',{center:[36.5,127.9],zoom:7});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);

// ── 데이터 로드
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const overlay = document.getElementById('overlay');
  btn.classList.add('spinning'); btn.disabled=true;
  if (ALL_STORES.length===0) overlay.classList.remove('hidden');
  try {
    const res = await fetch(GVZ_URL+'&t='+Date.now(), { mode: 'cors' });
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    ALL_STORES = parseStores(parseCSV(text));
    const now = new Date();
    document.getElementById('last-updated').textContent =
      '업데이트 '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    renderBrands(); renderAll();
    overlay.classList.add('hidden');
  } catch(e) {
    document.getElementById('overlay').innerHTML=`
      <div class="error-box">
        <h3>⚠️ 데이터 로드 실패</h3>
        <p>구글 시트에 연결할 수 없어요.<br>시트가 웹에 게시되어 있는지 확인해 주세요.</p>
        <button class="retry-btn" onclick="loadData()">다시 시도</button>
      </div>`;
  } finally { btn.classList.remove('spinning'); btn.disabled=false; }
}

function getFiltered() {
  return ALL_STORES.filter(s => {
    const mOk = currentMonth==='all' || s.month===parseInt(currentMonth);
    return mOk && activeBrands.has(s.brand);
  });
}

function formatSales(v) {
  if (!v||v===0) return '집계중';
  if (v>=100000000) return (v/100000000).toFixed(1)+'억';
  return Math.round(v/10000)+'만';
}

function renderAll() {
  const filtered = getFiltered();
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};

  filtered.forEach((s,i) => {
    const color=BRAND_COLORS[s.brand]||'#546e7a', mColor=MONTH_COLORS[s.month]||'#888';
    const sz = s.total_sales>80000000?16:s.total_sales>30000000?13:11;
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:${sz}px;height:${sz}px;background:${color};border:2.5px solid ${mColor};border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
    });
    const marker = L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup(`
      <div class="p-title" style="color:${color}">${s.name}</div>
      <div class="p-row"><span class="p-lbl">일정</span><span class="p-val">${s.schedule}${s.days?' ('+s.days+'일)':''}</span></div>
      <div class="p-row"><span class="p-lbl">전체 매출</span><span class="p-val p-sales">${formatSales(s.total_sales)}</span></div>
      ${s.daily_avg?`<div class="p-row"><span class="p-lbl">일평균</span><span class="p-val">${formatSales(s.daily_avg)}</span></div>`:''}
      ${s.manager?`<div class="p-row"><span class="p-lbl">담당자</span><span class="p-val">${s.manager}</span></div>`:''}
      <span class="p-badge" style="background:${mColor}22;color:${mColor}">${s.month}월</span>
    `,{maxWidth:230});
    marker.on('click',()=>selectStore(i));
    markers[i]=marker;
  });

  const listEl=document.getElementById('store-list');
  listEl.innerHTML = filtered.length===0
    ? '<div style="text-align:center;color:var(--text-muted);padding:30px 16px;font-size:12px">해당 조건의 매장이 없습니다</div>'
    : filtered.map((s,i)=>{
        const color=BRAND_COLORS[s.brand]||'#546e7a', mColor=MONTH_COLORS[s.month]||'#888';
        return `<div class="s-card ${selectedIdx===i?'selected':''}" id="sc-${i}" onclick="selectStore(${i})">
          <div class="s-top">
            <div class="s-dot" style="background:${color}"></div>
            <div class="s-name">${s.name}</div>
            <span class="s-mbadge" style="color:${mColor}">${s.month}월</span>
          </div>
          <div class="s-sched">${s.schedule}${s.days?' · '+s.days+'일':''}</div>
          <div class="s-meta">
            ${s.total_sales>0?`<span class="s-tag tag-sales">💰 ${formatSales(s.total_sales)}</span>`:''}
            ${s.manager?`<span class="s-tag tag-manager">👤 ${s.manager}</span>`:''}
          </div>
        </div>`;
      }).join('');

  const totalSales=filtered.reduce((a,s)=>a+(s.total_sales||0),0);
  document.getElementById('stat-count').textContent=filtered.length;
  document.getElementById('stat-sales').textContent=totalSales>0?formatSales(totalSales):'-';
  document.getElementById('list-count').textContent=filtered.length;
}

function selectStore(i) {
  const filtered=getFiltered(), s=filtered[i]; if(!s) return;
  if(selectedIdx!==null){const p=document.getElementById(`sc-${selectedIdx}`);if(p)p.classList.remove('selected');}
  selectedIdx=i;
  const cur=document.getElementById(`sc-${i}`);
  if(cur){cur.classList.add('selected');cur.scrollIntoView({block:'nearest',behavior:'smooth'});}
  if(markers[i]){map.flyTo([s.lat,s.lng],13,{duration:0.7});setTimeout(()=>markers[i].openPopup(),500);}
}

function renderBrands() {
  document.getElementById('brand-bar').innerHTML=Object.keys(BRAND_COLORS).map(b=>
    `<span class="b-chip chip-${b} ${activeBrands.has(b)?'active':''}" onclick="toggleBrand('${b}')">${b}</span>`
  ).join('');
}

function toggleBrand(b) {
  if(activeBrands.has(b)){if(activeBrands.size===1)return;activeBrands.delete(b);}
  else activeBrands.add(b);
  renderBrands(); renderAll();
}

document.querySelectorAll('.m-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMonth=btn.dataset.m; selectedIdx=null; renderAll();
  });
});

loadData();
setInterval(loadData, 5*60*1000); // 5분마다 자동 갱신
</script>
</body>
</html>
